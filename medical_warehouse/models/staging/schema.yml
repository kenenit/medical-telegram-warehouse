version: 2

models:
  - name: stg_telegram_messages
    description: "Cleaned and standardized Telegram messages"
    columns:
      - name: message_id
        description: "Unique message ID"
        tests:
          - not_null
      - name: channel_name
        description: "Channel username"
        tests:
          - not_null
      - name: message_date
        description: "When the message was posted"
        tests:
          - not_null